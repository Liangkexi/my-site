<h2 id="本章小结">本章小结</h2>
<ol>
<li>外汇市场是进行外汇买卖的交易网络，参与者包括外汇银行、经纪人、中央银行和客户。</li>
<li>即期外汇交易是成交后两个营业日内交割的交易方式，远期外汇交易是约定未来交割的交易方式。</li>
<li>套汇和套利是外汇市场的重要组成部分，套利往往与远期外汇交易结合（抵补套利）。</li>
<li>外汇风险是跨国经营活动中不可回避的问题，需要通过有效的风险管理手段加以控制。</li>
</ol>
