<h2 id="本章小结">本章小结</h2>
<ol>
<li>国际货币在国际经济交易中具有价值标准、支付手段、价值储藏三种职能，从私人交易和政府交易两个层次可细分为六种职能。</li>
<li>一国货币充当国际货币需要具备两个基本条件：可兑换性和强大的经济金融实力。</li>
<li>国际货币发行国可以享受诸多利益，但也承担相应的负担。</li>
<li>国际结算支付机制是国际支付体系的核心，票据结算是其基本方式。</li>
</ol>
