<h2 id="本章小结">本章小结</h2>
<ol>
<li>国际储备是一国货币当局持有的可随时调控的对外资产，包括黄金储备、外汇储备、特别提款权和储备头寸。</li>
<li>国际储备的职能包括弥补国际收支逆差、干预外汇市场、增强国际信用。</li>
<li>储备管理追求安全性、流动性和收益性的平衡。</li>
<li>国际储备体系从黄金主导到美元主导再到多元化储备的演变过程。</li>
</ol>
