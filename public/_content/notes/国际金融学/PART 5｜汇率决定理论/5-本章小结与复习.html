<h2 id="本章小结">本章小结</h2>
<ol>
<li>购买力平价理论是最基础的汇率决定理论，从商品市场的角度分析汇率，分为绝对购买力平价和相对购买力平价。</li>
<li>利率平价说从资本流动角度分析远期汇率的决定，弥补了购买力平价理论在短期分析中的不足。</li>
<li>国际收支说是从外汇供求角度分析汇率的决定与变动。</li>
<li>资产市场说从金融资产市场均衡角度分析汇率，是20世纪70年代后发展起来的重要理论。</li>
</ol>
